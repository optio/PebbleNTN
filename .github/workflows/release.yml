name: release

# Signed release build. Runs on version tags. Secrets are supplied by a protected GitHub
# environment; no signing material is stored in the repository (REQ-SEC-007).
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Verify Play target-SDK policy
        run: |
          ./gradlew -q verifyReleaseTargetSdk || echo "TODO(M10) implement release-time target SDK policy check"
        working-directory: android

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.UPLOAD_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "No signing keystore configured; failing release." >&2
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/upload.keystore"

      - name: Build signed AAB
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/upload.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease
        working-directory: android

      - name: Compute checksums
        run: |
          shopt -s nullglob
          for f in android/app/build/outputs/bundle/release/*.aab; do
            sha256sum "$f" > "$f.sha256"
          done

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-aab
          path: |
            android/app/build/outputs/bundle/release/*.aab
            android/app/build/outputs/bundle/release/*.sha256
          if-no-files-found: error

name: rules

on:
  push:
    branches: [main]
    paths:
      - "rules/**"
      - "schemas/**"
      - "examples/**"
      - "scripts/validate*.*"
      - ".github/workflows/rules.yml"
  pull_request:
    paths:
      - "rules/**"
      - "schemas/**"
      - "examples/**"
      - "scripts/validate*.*"
      - ".github/workflows/rules.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validator deps
        run: python -m pip install --upgrade jsonschema

      - name: Validate spec asset integrity
        run: ./scripts/validate-spec-assets.sh

      - name: Validate rulesets against schema
        run: ./scripts/validate-rules.sh

      - name: Rule regression (rule-workbench)
        run: python3 tools/rule-workbench/workbench.py regression

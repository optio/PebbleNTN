name: play-release

# Signed AAB for the Play Console. Manual: the tags this repo pushes come from the `release`
# workflow (which publishes the GitHub release with an APK + PBW), and a Play upload should be a
# deliberate act, not a side effect of every push to main.
#
# Secrets are supplied by a protected GitHub environment; no signing material is stored in the
# repository (REQ-SEC-007). Without those secrets this workflow fails by design.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.0)"
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Verify Play target-SDK policy
        run: |
          ./gradlew -q verifyReleaseTargetSdk || echo "TODO(M10) implement release-time target SDK policy check"
        working-directory: android

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.UPLOAD_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "No signing keystore configured; failing release." >&2
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/upload.keystore"

      - name: Build signed AAB
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/upload.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease
        working-directory: android

      - name: Compute checksums
        run: |
          shopt -s nullglob
          for f in android/app/build/outputs/bundle/release/*.aab; do
            sha256sum "$f" > "$f.sha256"
          done

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-aab
          path: |
            android/app/build/outputs/bundle/release/*.aab
            android/app/build/outputs/bundle/release/*.sha256
          if-no-files-found: error
